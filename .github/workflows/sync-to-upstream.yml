name: Sync to upstream
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: |
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_PAT }}@github.com/ethicsdecisionanalyzer/ethical-insight-pro.git
          git push upstream main --force
